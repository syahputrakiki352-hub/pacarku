<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ada Sesuatu Buat Kamu 💌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --primary: #ff4d6d;
            --primary-light: #ff758f;
            --primary-dark: #c9184a;
            --bg-gradient-1: #ffb5a7;
            --bg-gradient-2: #fcd5ce;
            --text-dark: #590d22;
            --text-muted: #800f2f;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), #f8edeb, #fec8c8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            padding: 3rem 2rem;
            box-shadow: 
                0 30px 60px rgba(255, 117, 143, 0.15),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 420px;
            width: 90%;
            z-index: 10;
            position: relative;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            box-shadow: 
                0 40px 80px rgba(255, 117, 143, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            transform: translateY(-5px);
        }

        .romantic-title {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .romantic-text {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 2.5rem;
            line-height: 1.7;
            font-weight: 400;
        }

        .romantic-text strong {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.2rem;
            display: block;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        .image-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 2rem auto;
            border-radius: 50%;
            background: white;
            padding: 5px;
            position: relative;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            z-index: 2;
        }

        .image-frame::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(45deg, #ff758f, #ffb5a7, #ff758f);
            border-radius: 50%;
            z-index: -1;
            animation: spinGlow 4s linear infinite;
            opacity: 0.6;
        }

        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
        }

        .action-area {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-base {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-love {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4);
            position: absolute;
            z-index: 5;
            min-width: 130px;
        }

        .btn-love:active {
            transform: scale(0.92);
        }

        .btn-love.breathing {
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4); }
            50% { transform: scale(1.08); box-shadow: 0 15px 35px rgba(255, 77, 109, 0.6); }
        }

        .btn-dodge {
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--text-muted);
            border: 1px solid rgba(255, 117, 143, 0.3);
            position: absolute;
            z-index: 10;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-width: 100px;
        }

        #success-view {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }
        
        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
        }

    </style>
</head>
<body>
    <!-- Canvas untuk partikel hati yang romantis -->
    <canvas id="canvas-container"></canvas>

    <div class="glass-card animate__animated animate__fadeInUp" id="card-container">
        
        <!-- Halaman Pertanyaan -->
        <div id="question-view">
            <div class="image-frame">
                <img src="/Users/kikisaputra/Documents/Working Files/IMG_3362.JPG" alt="Fotonya yang Cantik" id="reaction-img">
            </div>

            <h1 class="romantic-title">Hai, Cantikku...</h1>
            <p class="romantic-text">
                Aku bersyukur banget bisa kenal sama kamu. Tiap hari rasanya pengen terus sama kamu.<br>
                <strong>Kamu mau nggak jadi pacarku? 🥺</strong>
            </p>
            
            <div class="action-area">
                <button class="btn-base btn-love breathing" id="btn-yes" style="left: 10%;">Mauuu! 🥰</button>
                <button class="btn-base btn-dodge" id="btn-no" style="right: 10%;">Nggak</button>
            </div>
        </div>

        <!-- Halaman Sukses -->
        <div id="success-view">
            <div class="image-frame" style="box-shadow: 0 15px 35px rgba(255, 215, 0, 0.3);">
                <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Happy Bear Kisses">
            </div>
            <h1 class="romantic-title" style="font-size: 3rem; margin-top: 10px;">I Love You! ❤️</h1>
            <p class="romantic-text" style="font-size: 1.15rem; margin-bottom: 1.5rem;">
                Makasih ya sayang udah mau nerima aku!<br>
                Janji bakal selalu bikin kamu bahagia ✨
            </p>
            
            <!-- Tombol aksi nyata yang elegan -->
            <a href="#" id="wa-link" class="whatsapp-btn animate__animated animate__pulse animate__infinite">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Kabarin Aku Sekarang!
            </a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnNo = document.getElementById('btn-no');
            const btnYes = document.getElementById('btn-yes');
            const questionView = document.getElementById('question-view');
            const successView = document.getElementById('success-view');
            const cardContainer = document.getElementById('card-container');
            const reactionImg = document.getElementById('reaction-img');
            const waLink = document.getElementById('wa-link');
            
            // Konfigurasi pesan WhatsApp (Ganti nomornya dengan nomor Anda jika mau, format: 628xxx)
            // Saat ini dibuat membuka chat tanpa nomor spesifik agar bisa pilih kontak, atau bisa diisi spesifik
            const pesanSukses = encodeURIComponent("Hai sayang! Aku mau kok jadi pacar kamu ❤️🥰");
            waLink.href = `https://wa.me/?text=${pesanSukses}`;

            let dodgeCount = 0;
            const pleadMessages = [
                "Nggak",
                "Eh kok gitu 🥺",
                "Yakin nolak? 💔",
                "Masa nggak mau...",
                "Aku sayang kamu loh",
                "Beri aku kesempatan 🌹",
                "Plisss mau ya?",
                "Gabisa nolak hehe 🥰",
                "Pencet sebelahnya aja"
            ];

            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

            function runAway(e) {
                if(e && e.type === 'click') return; 

                dodgeCount++;
                
                // Update teks agar makin memelas
                const msgIndex = Math.min(dodgeCount, pleadMessages.length - 1);
                btnNo.innerHTML = pleadMessages[msgIndex];

                // Efek visual dramatis pada tombol
                let scaleNo = Math.max(0.6, 1 - (dodgeCount * 0.08)); 
                let scaleYes = Math.min(1.4, 1 + (dodgeCount * 0.05));
                
                btnYes.style.transform = `scale(${scaleYes})`;
                btnYes.classList.remove('breathing'); // Stop breathing while sizing up

                const cardRect = cardContainer.getBoundingClientRect();
                const btnWidth = btnNo.offsetWidth;
                const btnHeight = btnNo.offsetHeight;
                
                // Kalkulasi ruang aman (agar tidak keluar dari layar, dan menjauh dari kursor)
                const padding = 20;
                const maxX = window.innerWidth - btnWidth - padding;
                const maxY = window.innerHeight - btnHeight - padding;

                const randomX = Math.max(padding, Math.random() * maxX);
                const randomY = Math.max(padding, Math.random() * maxY);

                btnNo.style.position = 'fixed';
                btnNo.style.left = `${randomX}px`;
                btnNo.style.top = `${randomY}px`;
                btnNo.style.right = 'auto';
                btnNo.style.transform = `scale(${scaleNo})`;

                // Ubah gambar menjadi memelas setelah beberapa kali nolak
                if (dodgeCount === 2) {
                    reactionImg.src = "https://media.tenor.com/mO_PmbDhwfMAAAAi/crying-cute.gif";
                } else if (dodgeCount === 5) {
                    reactionImg.src = "https://media.tenor.com/J3-uG-OARLMAAAAi/tkthao219-bubududu.gif"; // Nangis kejer
                }
            }

            btnNo.addEventListener('mouseover', runAway);
            if (isTouch) {
                btnNo.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    runAway();
                }, {passive: false});
            }
            btnNo.addEventListener('click', (e) => {
                e.preventDefault();
                runAway();
            });

            btnYes.addEventListener('click', () => {
                // Hapus tombol No
                if (btnNo.parentNode) btnNo.remove();
                
                questionView.classList.add('animate__animated', 'animate__fadeOut');
                
                setTimeout(() => {
                    questionView.style.display = 'none';
                    
                    successView.style.display = 'flex';
                    successView.classList.add('animate__animated', 'animate__fadeIn');
                    
                    // Ubah nuansa kartu menjadi lebih bahagia (emas/merah muda cerah)
                    cardContainer.style.boxShadow = '0 30px 60px rgba(255, 77, 109, 0.4)';
                    cardContainer.style.background = 'rgba(255, 255, 255, 0.6)';
                    
                    // Picu efek ledakan partikel romantis
                    isSuccess = true;
                    createHeartExplosion();
                }, 500);
            });

            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let isSuccess = false;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Custom Path untuk bentuk Hati yang sempurna
            function drawHeart(ctx, x, y, width, height, color, alpha) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                const topCurveHeight = height * 0.3;
                ctx.moveTo(x, y + topCurveHeight);
                // Top left curve
                ctx.bezierCurveTo(
                    x, y, 
                    x - width / 2, y, 
                    x - width / 2, y + topCurveHeight
                );
                // Bottom left curve
                ctx.bezierCurveTo(
                    x - width / 2, y + (height + topCurveHeight) / 2, 
                    x, y + (height + topCurveHeight) / 2, 
                    x, y + height
                );
                // Bottom right curve
                ctx.bezierCurveTo(
                    x, y + (height + topCurveHeight) / 2, 
                    x + width / 2, y + (height + topCurveHeight) / 2, 
                    x + width / 2, y + topCurveHeight
                );
                // Top right curve
                ctx.bezierCurveTo(
                    x + width / 2, y, 
                    x, y, 
                    x, y + topCurveHeight
                );
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
                ctx.restore();
            }

            class Particle {
                constructor(x, y, isExplosion = false) {
                    this.x = x || Math.random() * canvas.width;
                    this.y = y || canvas.height + Math.random() * 100;
                    this.size = (Math.random() * 15 + 10) * (isExplosion ? 1.5 : 1);
                    
                    // Fisika gerak
                    if (isExplosion) {
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = Math.random() * 15 + 5;
                        this.vx = Math.cos(angle) * velocity;
                        this.vy = Math.sin(angle) * velocity;
                        this.gravity = 0.2;
                    } else {
                        this.vx = Math.random() * 1 - 0.5;
                        this.vy = -(Math.random() * 1.5 + 0.5);
                        this.gravity = 0;
                    }
                    
                    const colors = ['#ff4d6d', '#ff758f', '#ffb5a7', '#ffffff'];
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.alpha = Math.random() * 0.5 + 0.3;
                    this.fadeRate = isExplosion ? 0.01 : 0;
                    this.isExplosion = isExplosion;
                    
                    // Efek rotasi mengayun
                    this.angle = Math.random() * Math.PI * 2;
                    this.spin = (Math.random() - 0.5) * 0.1;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.angle += this.spin;
                    this.alpha -= this.fadeRate;

                    if (!this.isExplosion) {
                        // Gerakan mengayun lembut seperti daun jatuh terbalik
                        this.x += Math.sin(this.angle) * 1;
                    }
                }

                draw() {
                    if (this.alpha <= 0) return;
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    drawHeart(ctx, 0, 0, this.size, this.size, this.color, this.alpha);
                    ctx.restore();
                }
            }

            function initParticles() {
                // Background romantis awal
                for(let i=0; i<30; i++) {
                    particles.push(new Particle(null, Math.random() * canvas.height));
                }
            }

            function createHeartExplosion() {
                // Hapus partikel lambat
                particles = [];
                // Buat ledakan dari tengah layar
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                for(let i=0; i<100; i++) {
                    particles.push(new Particle(centerX, centerY, true));
                }
                
                // Tambahkan efek letupan susulan
                setTimeout(() => {
                    for(let i=0; i<50; i++) {
                        particles.push(new Particle(Math.random()*canvas.width, canvas.height/3, true));
                    }
                }, 800);
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Tambah partikel baru jika mode normal (belum klik Yes)
                if (!isSuccess && particles.length < 40 && Math.random() < 0.05) {
                    particles.push(new Particle());
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.update();
                    p.draw();

                    // Hapus partikel yang keluar layar atau hilang
                    if (p.alpha <= 0 || p.y < -50 || p.y > canvas.height + 150 || p.x < -50 || p.x > canvas.width + 50) {
                        particles.splice(i, 1);
                    }
                }
                
                requestAnimationFrame(animate);
            }

            initParticles();
            animate();
        });
    </script>
</body>
</html>
